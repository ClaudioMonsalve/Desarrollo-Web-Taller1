<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Ábaco — Plataforma para PYMEs</title>
  <meta name="description" content="Plataforma web integral para PYMEs: noticias, beneficios y herramientas para impulsar tu empresa." />
  <meta name="theme-color" content="#2A322E" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="dist/output.css" />
  <style>
    /* Utilidades del carrusel */
    .carousel-track { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
    .carousel-track::-webkit-scrollbar { display: none; }
    .carousel-slide { min-width: 100%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; scroll-snap-align: start; }
    .dot.active { background: #2A322E; width: 20px; border-radius: 10px; }
  </style>
</head>
<body class="bg-[#F5F0E8] font-inter text-[#2A322E]">

  <!-- Navbar -->
  <nav class="sticky top-0 z-50 flex items-center justify-between gap-3 px-4 py-3 bg-[#8D806F] border-b border-white/10 min-h-[56px] lg:px-8">
    <a href="/" class="block">
      <img src="src/assets/abaco logo.svg" class="w-[34px] h-[34px]" alt="Ábaco logo" />
    </a>
    
    <!-- Search Bar (Dropdown) -->
    <div class="relative flex-1 max-w-[420px]" id="search-container">
      <div class="flex items-center gap-2 w-full bg-[#F5F0E8] border-[1.5px] border-[#2A322E]/10 rounded-xl px-4 py-1 focus-within:border-[#3D6B50]">
        <input type="text" id="search-input" placeholder="¿Qué tipo pyme eres?" autocomplete="off" class="flex-1 bg-transparent border-none outline-none text-sm py-2 min-w-0" readonly style="cursor:pointer" />
        <button id="search-toggle" class="p-1 cursor-pointer">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M7 10L12 15L17 10" stroke="#4A5A50" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>
      <ul id="dropdown-list" class="absolute hidden top-full mt-2 left-0 right-0 bg-white border border-[#2A322E]/10 rounded-xl shadow-lg p-2 z-[100] list-none">
        <!-- Generado por JS -->
      </ul>
    </div>

    <a href="#perfil" class="block">
      <img src="src/assets/user - icon.svg" class="w-[34px] h-[34px]" alt="Perfil" />
    </a>
  </nav>

  <main class="max-w-7xl mx-auto pb-8">
    <!-- Carousel -->
    <section class="p-4 md:p-6 lg:p-8">
      <div id="carousel-track" class="carousel-track bg-[#EDE5D8] rounded-2xl">
        <!-- Generado por JS -->
      </div>
      <div id="carousel-dots" class="flex justify-center gap-2 py-3">
        <!-- Generado por JS -->
      </div>
    </section>

    <!-- Panels -->
    <section class="px-4 lg:px-8 flex flex-col lg:flex-row gap-4">
      <!-- Noticias -->
      <div class="flex-1 bg-[#E0D5C3] rounded-2xl p-4 min-h-[140px] lg:min-h-[180px]">
        <div class="flex items-center gap-3 bg-[#F5F0E8]/85 rounded-xl px-4 py-3 mb-3">
          <img src="src/assets/ico noticia.svg" class="w-[30px] h-[30px]" alt="Noticias" />
          <h3 class="font-bold text-[1.1rem]">Noticias</h3>
        </div>
        <div id="panel-noticias" class="px-1 text-sm text-[#4A5A50]">
          <!-- Generado por JS -->
        </div>
      </div>

      <!-- Beneficios -->
      <div class="flex-1 bg-[#E0D5C3] rounded-2xl p-4 min-h-[140px] lg:min-h-[180px]">
        <div class="flex items-center gap-3 bg-[#F5F0E8]/85 rounded-xl px-4 py-3 mb-3">
          <img src="src/assets/hand-money-cash-hold-coins-svgrepo-com 1.svg" class="w-[30px] h-[30px]" alt="Beneficios" />
          <h3 class="font-bold text-[1.1rem]">Beneficios</h3>
        </div>
        <div id="panel-beneficios" class="px-1 text-sm text-[#4A5A50]">
          <!-- Generado por JS -->
        </div>
      </div>
    </section>
  </main>

  <script type="module" src="src/features/home/home.js"></script>
</body>
</html>
