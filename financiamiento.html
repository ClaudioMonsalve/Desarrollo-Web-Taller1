<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Evaluador de Bancos — Ábaco</title>
  <link rel="stylesheet" href="dist/output.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Inter', sans-serif; }
    .filter-pill {
      padding: 8px 18px; border-radius: 50px; border: 1.5px solid #C4B89E;
      background: transparent; color: #4A5A50; font-size: 0.85rem; cursor: pointer;
    }
    .filter-pill:hover { border-color: #2A322E; }
    .filter-pill.active { background: #2A322E; color: #F5F0E8; border-color: #2A322E; }
    .bank-card {
      background: #fff; border-radius: 14px; padding: 20px;
      box-shadow: 0 2px 8px rgba(42,50,46,0.06); margin-bottom: 16px;
      border: 1.5px solid transparent;
    }
    .bank-card.recommended { border-color: #3D6B50; }
    .bank-card.recommended::before {
      content: '★ Recomendado'; display: inline-block;
      background: #3D6B50; color: #F5F0E8; font-size: 0.7rem; font-weight: 700;
      padding: 3px 12px; border-radius: 20px; margin-bottom: 8px;
    }
    .stat { font-size: 0.78rem; background: #F5F0E8; border-radius: 6px; padding: 4px 10px; display: inline-block; margin: 2px; }
    .stat.good { background: #e8f5ee; color: #1a6b3a; }
    .stat.warn { background: #fef3e2; color: #8a5a1a; }
    .bar { height: 5px; background: #EDE5D8; border-radius: 3px; margin: 4px 0; }
    .bar-fill { height: 100%; border-radius: 3px; }
    .profile-card {
      background: #fff; border: 1.5px solid #EDE5D8; border-radius: 12px;
      padding: 16px; cursor: pointer; text-align: center;
    }
    .profile-card.selected { border-color: #3D6B50; background: #f0f8f3; }
    .tag { font-size: 0.75rem; background: #F5F0E8; border-radius: 20px; padding: 3px 10px; display: inline-block; margin: 2px; color: #4A5A50; }
  </style>
</head>
<body class="bg-[#F5F0E8] text-[#2A322E]">

  <header class="bg-[#8D806F] p-4 text-white flex items-center justify-between">
    <a href="index.html" class="font-bold text-lg no-underline text-white">← Inicio</a>
    <h1 class="text-xl font-semibold">Evaluador de Bancos</h1>
    <div style="width:60px"></div>
  </header>

  <main class="max-w-4xl mx-auto px-4 py-6">

    <section class="text-center mb-8">
      <h2 class="text-2xl font-bold mb-2">¿Qué banco le conviene a tu PYME?</h2>
      <p class="text-[#6B7D72]">Compara tasas, requisitos y beneficios de los principales bancos.</p>
    </section>

    <o-bank-evaluator></o-bank-evaluator>

    <p class="text-xs text-[#6B7D72] text-center mt-6 italic">* Tasas referenciales. Consulta con cada banco.</p>
  </main>

  <script type="module" src="src/features/financiamiento/financiamiento.page.js"></script>
</body>
</html>
